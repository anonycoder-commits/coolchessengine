plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java {
    // JDK 19+ required for Long.compress/Long.expand (hardware PEXT/PDEP on x86-64 BMI2),
    // used by the PEXT sliding-attack mode in engine.board.Attacks. The lichess-bot
    // consumer (see copyToLichessBot) must launch MyEngine.jar with a JRE >= this version.
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    mainClass = 'engine.uci.Uci'
    // NNUE SIMD uses the incubator Vector API; it must be resolved at run time too.
    applicationDefaultJvmArgs = ['--add-modules', 'jdk.incubator.vector']
}

// jdk.incubator.vector (SIMD NNUE inference) must be added at compile and run time.
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += ['--add-modules', 'jdk.incubator.vector']
}

jar {
    manifest {
        attributes 'Main-Class': 'engine.uci.Uci'
        // Launch must still pass --add-modules jdk.incubator.vector on the java command line
        // (manifests can't request incubator modules). NNUE is now the DEFAULT eval, so this is
        // required for the shipping engine to use the bundled net -- without it the engine
        // degrades to the handcrafted eval (it never crashes; see Uci.applyEvaluator). The
        // lichess-bot config.yml passes it via interpreter_options (see config.yml.default).
    }
}

// Keeps the lichess-bot engine binary in sync with the latest build, since
// lichess-bot/config.yml runs it as a plain 'java -jar MyEngine.jar'.
tasks.register('copyToLichessBot', Copy) {
    dependsOn jar
    from jar.archiveFile
    into "$rootDir/lichess-bot/engines"
    rename { 'MyEngine.jar' }
}

jar.finalizedBy copyToLichessBot

test {
    useJUnitPlatform()
    jvmArgs += ['--add-modules', 'jdk.incubator.vector']
    maxHeapSize = '2g'
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = true
    }
}
